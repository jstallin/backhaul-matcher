name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}

  playwright:
    name: Playwright cross-browser tests
    runs-on: ubuntu-latest
    # Tests run against the live staging or production site depending on target branch.
    # Pushes/PRs targeting main → production URL. Everything else → staging URL.
    # Set TEST_EMAIL + TEST_PASSWORD in repo secrets to also run authenticated tests.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npx playwright test
        env:
          TEST_BASE_URL: ${{ (github.base_ref == 'main' || github.ref == 'refs/heads/main') && 'https://haulmonitor.cloud/app' || 'https://backhaul-matcher-staging.vercel.app/app' }}
          # Only pass auth credentials when targeting production — staging Supabase has a
          # separate user database and production credentials will not work there.
          # TODO: add STAGING_TEST_EMAIL / STAGING_TEST_PASSWORD secrets + staging test user
          # in Supabase dashboard to enable authenticated tests on staging as well.
          TEST_EMAIL: ${{ (github.base_ref == 'main' || github.ref == 'refs/heads/main') && secrets.TEST_EMAIL || '' }}
          TEST_PASSWORD: ${{ (github.base_ref == 'main' || github.ref == 'refs/heads/main') && secrets.TEST_PASSWORD || '' }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
