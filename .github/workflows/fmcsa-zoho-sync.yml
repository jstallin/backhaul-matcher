name: FMCSA → Zoho Prospect Sync

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (filter only, no Zoho push)'
        type: boolean
        default: false
  schedule:
    # 1st of every month at 6:00 AM UTC
    - cron: '0 6 1 * *'

jobs:
  sync:
    name: Sync FMCSA carriers to Zoho CRM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        env:
          ZOHO_CLIENT_ID: ${{ secrets.ZOHO_CLIENT_ID }}
          ZOHO_CLIENT_SECRET: ${{ secrets.ZOHO_CLIENT_SECRET }}
          ZOHO_REFRESH_TOKEN: ${{ secrets.ZOHO_REFRESH_TOKEN }}
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          MIN_UNITS: '3'
          MAX_UNITS: '75'
        run: node scripts/fmcsa-zoho-sync.mjs
