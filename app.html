<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/haul-monitor-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haul Monitor - Smart Return Route Optimization</title>

    <meta name="theme-color" content="#3d5f82" />
    <!--
      PWA / "Add to Home Screen" app DISABLED for now (issue #34) — the iOS
      standalone experience was misbehaving, so users access Haul Monitor through
      the browser only. To re-enable, restore the manifest link + the
      mobile-web-app-capable / apple-mobile-web-app-* meta tags + apple-touch-icon,
      and switch the script below back to registering /sw.js.
    -->
    <link rel="apple-touch-icon" href="/haul-monitor-icon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Darker+Grotesque:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // PWA disabled (issue #34): unregister any previously-installed service
      // worker and clear its caches so users who "Added to Home Screen" return to
      // normal browser behavior. Restore registration here to re-enable the PWA.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((regs) => regs.forEach((r) => r.unregister()))
          .catch(() => {});
        if (window.caches && caches.keys) {
          caches.keys().then((keys) => keys.forEach((k) => caches.delete(k))).catch(() => {});
        }
      }
    </script>
  </body>
</html>
